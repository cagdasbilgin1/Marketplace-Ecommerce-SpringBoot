server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/marketplace}
  cloud:
    gateway:
      server:
        webflux:
          default-filters:
            - RemoveRequestHeader=Cookie
          routes:
            - id: user-profile-service
              uri: ${USER_PROFILE_SERVICE_URL:http://localhost:8081}
              predicates:
                - Path=/api/profiles/**
              filters:
                - StripPrefix=2
            - id: catalog-service
              uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
              predicates:
                - Path=/api/catalog/**
              filters:
                - StripPrefix=2
            - id: inventory-service
              uri: ${INVENTORY_SERVICE_URL:http://localhost:8083}
              predicates:
                - Path=/api/inventory/**
              filters:
                - StripPrefix=2
            - id: cart-service
              uri: ${CART_SERVICE_URL:http://localhost:8084}
              predicates:
                - Path=/api/cart/**
              filters:
                - StripPrefix=2
            - id: order-service
              uri: ${ORDER_SERVICE_URL:http://localhost:8085}
              predicates:
                - Path=/api/orders/**
              filters:
                - StripPrefix=2
            - id: payment-service
              uri: ${PAYMENT_SERVICE_URL:http://localhost:8086}
              predicates:
                - Path=/api/payments/**
              filters:
                - StripPrefix=2
            - id: notification-service
              uri: ${NOTIFICATION_SERVICE_URL:http://localhost:8087}
              predicates:
                - Path=/api/notifications/**
              filters:
                - StripPrefix=2

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

marketplace:
  auth:
    keycloak-url: ${KEYCLOAK_BASE_URL:http://localhost:9090}
    realm: ${KEYCLOAK_REALM:marketplace}
    public-client-id: ${KEYCLOAK_PUBLIC_CLIENT_ID:marketplace-cli}
    admin-realm: ${KEYCLOAK_ADMIN_REALM:master}
    admin-client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:admin-cli}
    admin-username: ${KEYCLOAK_ADMIN_USERNAME:admin}
    admin-password: ${KEYCLOAK_ADMIN_PASSWORD:admin}
    customer-role: ${KEYCLOAK_CUSTOMER_ROLE:CUSTOMER}
