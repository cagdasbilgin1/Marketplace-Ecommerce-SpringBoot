server:
  port: ${PORT:8087}

spring:
  application:
    name: notification-service
  datasource:
    url: ${NOTIFICATION_DB_URL:jdbc:postgresql://localhost:5432/notification_db}
    username: ${NOTIFICATION_DB_USERNAME:notification_user}
    password: ${NOTIFICATION_DB_PASSWORD:notification_pass}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:marketplace}
    password: ${RABBITMQ_PASSWORD:marketplace}
    listener:
      simple:
        retry:
          enabled: true
          max-attempts: 3
    template:
      mandatory: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/marketplace}

app:
  messaging:
    exchange: marketplace.events
    queues:
      notification-events: notification.events

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true
